limit: 1000
memory_size: 0x1000
memory_mapped_io:
  0x80: [1000]
  0x84: []
reports:
  - name: Step-by-step
    slice: all
    view: |
      {T0},{T1},{T2} {Ra} {Sp}
      {pc}:	{instruction}	{pc:label}
  - name: Result
    slice: last
    view: |
      numio[0x80]: {io:0x80:dec}
      numio[0x84]: {io:0x84:dec}
    assert: |
      numio[0x80]: [] >>> []
      numio[0x84]: [] >>> [500500]